{%extends 'base.html' %}


{% block content %}
<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <div id="map" style="height: 600px;"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    const points = JSON.parse('{{ template_data.map_points_json|escapejs }}');                                                                                                                                                                                               
    points.forEach(p => {                                                                                                                                                                                                                                                    
      const icon = L.icon({                                                                                                                                                                                                                                                  
        iconUrl: p.image_url,                                                                                                                                                                                                                                                
        iconSize: [40, 60],                                                                                                                                                                                                                                                  
        iconAnchor: [20, 60],                                                                                                                                                                                                                                                
        popupAnchor: [0, -60],                                                                                                                                                                                                                                               
      });                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                             
      L.marker([p.lat, p.lng], { icon })                                                                                                                                                                                                                                     
        .addTo(map)                                                                                                                                                                                                                                                          
        .bindPopup(`${p.movie_name} (${p.avg_rating.toFixed(1)})`);                                                                                                                                                                                                          
    });             
  </script>





{% endblock %}
