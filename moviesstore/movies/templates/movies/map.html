{%extends 'base.html' %}


{% block content %}
<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    .movie-popup .leaflet-popup-content-wrapper {
      background: #111;
      color: #f2f2f2;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      padding: 0;
    }

    .movie-popup .leaflet-popup-content {
      margin: 0;
      width: 280px;
      font-family: "Georgia", serif;
    }

    .movie-popup .leaflet-popup-tip {
      background: #111;
    }

    .popup-card {
      padding: 14px 16px;
    }

    .popup-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 10px;
      padding-bottom: 6px;
    }

    .popup-region {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .popup-subtitle {
      font-size: 12px;
      color: #bbb;
    }

    .popup-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .popup-row:last-child {
      border-bottom: none;
    }

    .popup-rank {
      color: #ffcf66;
      font-weight: 700;
    }

    .popup-title {
      font-size: 13px;
      line-height: 1.2;
    }

    .popup-rating {
      font-size: 12px;
      color: #9fd0ff;
      white-space: nowrap;
    }
  </style>
  <div id="map" style="height: 600px;"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    const points = JSON.parse('{{ template_data.map_points_json|escapejs }}');

    function buildPopupHTML(point) {
      const rows = (point.movies || []).map((m, i) => {
        const rating = (m.avg_rating ?? 0)
        const count = m.rating_count ?? 0;
        return `
          <div class="popup-row">
            <div class="popup-rank">#${i + 1}</div>
            <div class="popup-title">${m.movie__name}</div>
            <div class="popup-rating">${rating} ⭐ (${count})</div>
          </div>
        `;
      }).join("");

      return `
        <div class="popup-card">
          <div class="popup-header">
            <div class="popup-region">${point.country}</div>
            <div class="popup-subtitle">Top 5 Movies</div>
          </div>
          <div class="popup-body">
            ${rows}
          </div>
        </div>
      `;
    }

    points.forEach(p => {
      // Create a pin on each country with the top movie poster as the icon.
      const iconUrl = (p.movies && p.movies[0] && p.movies[0].movie__image) ? p.movies[0].movie__image : null;
      const icon = iconUrl ? L.icon({
        iconUrl,
        iconSize: [50, 75],
        iconAnchor: [25, 75],
        popupAnchor: [0, -75]
      }) : undefined;

      L.marker([p.lat, p.lng], icon ? { icon } : undefined)
        .addTo(map)
        .bindPopup(buildPopupHTML(p), { className: "movie-popup" });
    });
  </script>





{% endblock %}
