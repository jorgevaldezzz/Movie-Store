{% extends 'base.html' %} {% block content %}
<header class="masthead bg-index text-white text-center py-4">
    <div class="container d-flex align-items-center flex-column pt-2">
        <h2>GT Movies Store</h2>
        <p>Your Ticket to Unlimited Entertainment!</p>
    </div>
</header>
<div class="p-3">
    <div class="container">
        <div class="row mt-3">
            <div class="col mx-auto text-center mb-3">
                <h4>Welcome to the best movie store!!</h4>
                {% if not user.is_authenticated %}
                <p class="mt-3">Please log in or sign up to use all available functionality!</p>
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <a href="{% url 'accounts.login' %}" class="btn btn-primary btn-lg">
                        Log In
                    </a>
                    <a href="{% url 'accounts.signup' %}" class="btn btn-outline-secondary btn-lg">
                        Sign Up
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock content %}
